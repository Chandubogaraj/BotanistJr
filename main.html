<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Botanistjr2 - Live Plant Identifier</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    :root {
      --green-deep:   #091a10;
      --green-dark:   #0d2018;
      --green-mid:    #1d6b30;
      --green-bright: #2d9a46;
      --green-glow:   rgba(50,200,90,0.18);
      --green-text:   #c8ecd4;
      --green-muted:  rgba(100,200,130,0.55);
      --green-accent: #6dda8a;
      --leaf-border:  rgba(80,180,100,0.25);
      --input-bg:     rgba(20,50,28,0.65);
      --card-bg:      rgba(12,30,18,0.97);
    }

    html, body {
      min-height: 100vh;
      font-family: 'Cormorant Garamond', serif;
      background: radial-gradient(ellipse at 30% 20%, #0f2a18 0%, #091a10 50%, #050f08 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 40px 20px 60px;
      overflow-x: hidden;
    }

    /* ── BACKGROUND ── */
    .bokeh {
      position: fixed; border-radius: 50%;
      filter: blur(70px); pointer-events: none; z-index: 0;
      animation: bokehDrift ease-in-out infinite;
    }
    .b1 { width:320px;height:320px;background:rgba(28,110,55,0.2);  top:-90px; left:-80px; animation-duration:9s; }
    .b2 { width:220px;height:220px;background:rgba(18,90,44,0.16);  bottom:-70px;right:-50px;animation-duration:12s; }
    .b3 { width:160px;height:160px;background:rgba(40,155,75,0.12); top:45%; right:8%; animation-duration:7s; }
    @keyframes bokehDrift {
      0%,100% { transform:translate(0,0) scale(1); }
      50%      { transform:translate(18px,-28px) scale(1.12); }
    }

    .scanlines {
      position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.025) 2px,rgba(0,0,0,0.025) 4px);
      pointer-events: none; z-index: 1;
    }

    .particle {
      position: fixed; border-radius: 50%;
      background: rgba(80,200,110,0.45);
      pointer-events: none;
      animation: particleDrift linear infinite;
    }
    @keyframes particleDrift {
      from { transform:translateY(102vh); opacity:0; }
      8%   { opacity:0.7; }
      92%  { opacity:0.4; }
      to   { transform:translateY(-5vh); opacity:0; }
    }

    /* ── PAGE WRAPPER ── */
    .page { position: relative; z-index: 10; width: 100%; max-width: 860px; }

    /* ── TOP NAV ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 36px;
      animation: fadeDown 0.7s ease both;
    }
    @keyframes fadeDown {
      from { opacity:0; transform:translateY(-14px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .brand {
      display: flex; align-items: center; gap: 12px;
    }

    .brand-emblem {
      width: 42px; height: 42px;
      background: linear-gradient(135deg, #195826, #2d8a45);
      border-radius: 50% 0 50% 0;
      display: flex; align-items: center; justify-content: center;
      border: 1px solid rgba(100,225,125,0.38);
      box-shadow: 0 4px 20px rgba(28,110,55,0.5), 0 0 16px rgba(60,200,100,0.25);
      animation: emblemPulse 3.5s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes emblemPulse {
      0%,100% { box-shadow:0 4px 20px rgba(28,110,55,0.5),0 0 16px rgba(60,200,100,0.25); }
      50%      { box-shadow:0 6px 32px rgba(30,140,70,0.7),0 0 30px rgba(60,220,100,0.45); }
    }

    .brand-text h1 {
      font-family: 'Playfair Display', serif;
      font-size: 20px; font-weight: 700;
      letter-spacing: 1px;
      background: linear-gradient(135deg,#60d080,#aaf0c0,#60d080);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .brand-text p {
      font-size: 10px; letter-spacing: 4px;
      color: var(--green-muted); text-transform: uppercase;
      margin-top: 2px;
    }

    .logout-btn {
      font-family: 'Cormorant Garamond', serif;
      font-size: 12px; letter-spacing: 3px; text-transform: uppercase;
      color: rgba(100,185,125,0.6);
      text-decoration: none;
      border: 1px solid rgba(80,180,100,0.2);
      border-radius: 8px;
      padding: 8px 18px;
      transition: all 0.25s ease;
      background: rgba(20,50,28,0.4);
    }
    .logout-btn:hover {
      color: #7de8a0;
      border-color: rgba(80,200,110,0.45);
      background: rgba(20,60,32,0.65);
      box-shadow: 0 0 16px rgba(50,200,90,0.18);
    }

    /* ── MAIN GRID ── */
    .main-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      animation: gridIn 0.85s cubic-bezier(0.22,1,0.36,1) 0.15s both;
    }
    @keyframes gridIn {
      from { opacity:0; transform:translateY(30px); }
      to   { opacity:1; transform:translateY(0); }
    }

    @media (max-width: 640px) {
      .main-grid { grid-template-columns: 1fr; }
    }

    /* ── CARD BASE ── */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--leaf-border);
      border-radius: 22px;
      padding: 28px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 30px 60px rgba(0,0,0,0.6), 0 0 50px var(--green-glow),
                  inset 0 1px 0 rgba(120,220,140,0.1);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 40px 80px rgba(0,0,0,0.7), 0 0 70px rgba(40,190,85,0.2),
                  inset 0 1px 0 rgba(150,245,170,0.15);
    }
    .card::before {
      content:''; position:absolute; top:0;left:0;right:0; height:40%;
      background: linear-gradient(180deg,rgba(100,220,120,0.04) 0%,transparent 100%);
      pointer-events: none;
    }

    .card-title {
      font-size: 11px; letter-spacing: 4px; text-transform: uppercase;
      color: rgba(100,185,125,0.6);
      margin-bottom: 18px;
      display: flex; align-items: center; gap: 8px;
    }
    .card-title::after {
      content:''; flex:1; height:1px;
      background: linear-gradient(90deg,rgba(80,180,100,0.25),transparent);
    }

    /* ── VIDEO CARD ── */
    .video-wrap {
      position: relative;
      border-radius: 14px;
      overflow: hidden;
      background: #050f08;
      border: 1px solid rgba(60,150,80,0.2);
      aspect-ratio: 1 / 1;
    }

    #video {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      border-radius: 14px;
    }

    /* scanning overlay */
    .scan-overlay {
      position: absolute; inset: 0;
      pointer-events: none;
      border-radius: 14px;
      overflow: hidden;
    }

    .scan-line {
      position: absolute; left:0; right:0; height:2px;
      background: linear-gradient(90deg, transparent, rgba(80,220,110,0.7), transparent);
      animation: scanMove 2.5s ease-in-out infinite;
      opacity: 0;
    }
    .scan-line.active { opacity: 1; }
    @keyframes scanMove {
      0%   { top: 0%; }
      100% { top: 100%; }
    }

    .scan-corners span {
      position: absolute; width:18px; height:18px;
      border-color: rgba(80,220,110,0.6); border-style: solid;
      border-width: 0;
    }
    .scan-corners span:nth-child(1) { top:8px;  left:8px;  border-top-width:2px; border-left-width:2px;  border-radius:4px 0 0 0; }
    .scan-corners span:nth-child(2) { top:8px;  right:8px; border-top-width:2px; border-right-width:2px; border-radius:0 4px 0 0; }
    .scan-corners span:nth-child(3) { bottom:8px; left:8px;  border-bottom-width:2px; border-left-width:2px;  border-radius:0 0 0 4px; }
    .scan-corners span:nth-child(4) { bottom:8px; right:8px; border-bottom-width:2px; border-right-width:2px; border-radius:0 0 4px 0; }

    /* no-camera state */
    .no-cam {
      position:absolute; inset:0;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:10px;
      color: rgba(100,185,125,0.45);
      font-size:13px; letter-spacing:1px;
      text-align:center; padding:20px;
    }

    /* ── CAPTURE BUTTON ── */
    .btn-capture {
      width: 100%;
      margin-top: 18px;
      padding: 14px;
      background: linear-gradient(135deg, #1b6430 0%, #2d9a46 50%, #1b6430 100%);
      background-size: 200% 100%;
      border: 1px solid rgba(80,205,115,0.32);
      border-radius: 13px;
      color: #b6f0c6;
      font-family: 'Playfair Display', serif;
      font-size: 14px; font-weight: 700;
      letter-spacing: 4px; text-transform: uppercase;
      cursor: pointer;
      position: relative; overflow: hidden;
      transition: all 0.35s ease;
      box-shadow: 0 4px 22px rgba(28,115,58,0.38), inset 0 1px 0 rgba(160,240,180,0.14);
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .btn-capture:hover {
      background-position: -100% 0;
      transform: translateY(-2px);
      color: #d8fce8;
      box-shadow: 0 10px 36px rgba(30,150,70,0.52), 0 0 44px rgba(50,200,90,0.22);
    }
    .btn-capture:active { transform: scale(0.975); }
    .btn-capture:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .btn-ripple {
      position: absolute;
      background: rgba(180,255,200,0.28);
      border-radius: 50%;
      transform: translate(-50%,-50%) scale(0);
      animation: rippleAnim 0.65s ease-out forwards;
      pointer-events: none;
    }
    @keyframes rippleAnim {
      to { transform:translate(-50%,-50%) scale(4); opacity:0; width:300px; height:300px; }
    }

    .btn-spinner {
      width:18px; height:18px;
      border:2px solid rgba(180,255,200,0.3);
      border-top-color:#b6f0c6;
      border-radius:50%;
      animation:spin 0.7s linear infinite;
      display:none; flex-shrink:0;
    }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* ── RESULT CARD ── */
    .result-placeholder {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 220px;
      gap: 14px;
      color: rgba(100,185,125,0.3);
      text-align: center;
    }
    .result-placeholder svg { opacity: 0.2; }
    .result-placeholder p { font-size: 13px; letter-spacing: 1.5px; text-transform: uppercase; }

    /* result content */
    .result-content { display: none; }
    .result-content.visible { display: block; animation: resultIn 0.5s ease both; }
    @keyframes resultIn {
      from { opacity:0; transform:translateY(12px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .plant-name-big {
      font-family: 'Playfair Display', serif;
      font-size: 26px; font-weight: 700; font-style: italic;
      background: linear-gradient(135deg,#60d080,#aaf0c0,#60d080);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.2;
      margin-bottom: 6px;
    }

    .scientific-name {
      font-size: 14px; font-style: italic;
      color: rgba(100,185,125,0.55);
      letter-spacing: 0.5px;
      margin-bottom: 24px;
    }

    .divider-sm {
      height: 1px;
      background: linear-gradient(90deg,transparent,rgba(80,180,100,0.3),transparent);
      margin: 20px 0;
    }

    .stat-row {
      display: flex; align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .stat-label {
      font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
      color: rgba(100,185,125,0.5);
    }

    .stat-value {
      font-size: 15px; font-weight: 600;
      color: var(--green-text);
      letter-spacing: 0.3px;
    }

    /* confidence bar */
    .conf-bar-wrap {
      margin-top: 20px;
    }
    .conf-bar-label {
      display: flex; justify-content: space-between;
      font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
      color: rgba(100,185,125,0.5);
      margin-bottom: 8px;
    }
    .conf-bar-track {
      height: 6px; border-radius: 3px;
      background: rgba(20,55,30,0.8);
      border: 1px solid rgba(60,150,80,0.2);
      overflow: hidden;
    }
    .conf-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #1d6b30, #6dda8a);
      border-radius: 3px;
      width: 0%;
      transition: width 1s cubic-bezier(0.22,1,0.36,1);
      box-shadow: 0 0 8px rgba(80,220,110,0.4);
    }

    /* error state */
    .result-error {
      display: none;
      background: rgba(200,80,60,0.12);
      border: 1px solid rgba(220,100,80,0.3);
      border-radius: 11px;
      padding: 14px 18px;
      font-size: 13.5px;
      color: #f08878;
      letter-spacing: 0.3px;
    }
    .result-error.visible { display: block; animation: resultIn 0.4s ease; }

    /* ── STATUS BADGE ── */
    .status-badge {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase;
      padding: 5px 12px; border-radius: 20px;
      margin-bottom: 18px;
    }
    .status-badge.live {
      background: rgba(30,120,55,0.25);
      border: 1px solid rgba(80,200,110,0.3);
      color: rgba(100,220,130,0.8);
    }
    .status-badge.live .dot {
      width:6px; height:6px; border-radius:50%;
      background:#5de882;
      box-shadow:0 0 6px rgba(80,230,120,0.7);
      animation: blinkDot 1.5s ease-in-out infinite;
    }
    @keyframes blinkDot {
      0%,100% { opacity:1; } 50% { opacity:0.3; }
    }
    .status-badge.ready {
      background: rgba(20,60,30,0.3);
      border: 1px solid rgba(60,150,80,0.2);
      color: rgba(100,185,125,0.45);
    }
    .status-badge.ready .dot {
      width:6px; height:6px; border-radius:50%;
      background: rgba(100,185,125,0.4);
    }
  </style>
</head>
<body>

<!-- Background -->
<div class="bokeh b1"></div>
<div class="bokeh b2"></div>
<div class="bokeh b3"></div>
<div class="scanlines"></div>

<div class="page">

  <!-- Top bar -->
  <div class="topbar">
    <div class="brand">
      <div class="brand-emblem">
        <svg width="22" height="22" viewBox="0 0 28 28" fill="none">
          <path d="M14 24C14 24 4 18 4 10C4 5 9 2 14 2C19 2 24 5 24 10C24 18 14 24 14 24Z" fill="rgba(180,255,200,0.88)"/>
          <line x1="14" y1="24" x2="14" y2="8" stroke="rgba(28,90,45,0.85)" stroke-width="1.6" stroke-linecap="round"/>
          <line x1="14" y1="15" x2="10" y2="11" stroke="rgba(28,90,45,0.6)" stroke-width="1.2" stroke-linecap="round"/>
          <line x1="14" y1="18" x2="18" y2="14" stroke="rgba(28,90,45,0.6)" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="brand-text">
        <h1>Botanistjr2</h1>
        <p>Plant Identifier</p>
      </div>
    </div>
    <a href="/logout" class="logout-btn">Logout</a>
  </div>

  <!-- Main grid -->
  <div class="main-grid">

    <!-- Camera card -->
    <div class="card">
      <div class="card-title">Live Camera</div>

      <div id="statusBadge" class="status-badge ready">
        <div class="dot"></div>
        <span id="statusText">Initialising</span>
      </div>

      <div class="video-wrap">
        <video id="video" autoplay playsinline muted></video>
        <div class="scan-overlay">
          <div class="scan-line" id="scanLine"></div>
          <div class="scan-corners">
            <span></span><span></span><span></span><span></span>
          </div>
        </div>
        <div class="no-cam" id="noCam" style="display:none;">
          <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
            <rect x="2" y="10" width="36" height="24" rx="5" stroke="currentColor" stroke-width="1.5"/>
            <circle cx="20" cy="22" r="7" stroke="currentColor" stroke-width="1.5"/>
            <path d="M14 10V8a3 3 0 013-3h6a3 3 0 013 3v2" stroke="currentColor" stroke-width="1.5"/>
            <line x1="4" y1="4" x2="36" y2="36" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <p id="noCamMsg">Camera unavailable</p>
        </div>
      </div>

      <button class="btn-capture" id="captureBtn" onclick="capture()">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" id="captureIcon">
          <circle cx="8" cy="8" r="5" stroke="currentColor" stroke-width="1.4"/>
          <circle cx="8" cy="8" r="2.5" fill="currentColor"/>
          <rect x="5" y="2" width="6" height="1.5" rx="0.75" fill="currentColor"/>
        </svg>
        <div class="btn-spinner" id="btnSpinner"></div>
        <span id="btnText">Identify Plant</span>
      </button>
    </div>

    <!-- Result card -->
    <div class="card">
      <div class="card-title">Identification Result</div>

      <div class="result-placeholder" id="placeholder">
        <svg width="52" height="52" viewBox="0 0 52 52" fill="none">
          <path d="M26 46C26 46 8 36 8 20C8 11 16 5 26 5C36 5 44 11 44 20C44 36 26 46 26 46Z" stroke="rgba(100,200,130,0.5)" stroke-width="1.5"/>
          <line x1="26" y1="46" x2="26" y2="18" stroke="rgba(100,200,130,0.4)" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="26" y1="28" x2="20" y2="22" stroke="rgba(100,200,130,0.3)" stroke-width="1.2" stroke-linecap="round"/>
          <line x1="26" y1="34" x2="32" y2="28" stroke="rgba(100,200,130,0.3)" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
        <p>Point camera at a plant<br>and capture to identify</p>
      </div>

      <div class="result-content" id="resultContent">
        <div class="plant-name-big" id="plantName">—</div>
        <div class="scientific-name" id="sciName">—</div>

        <div class="divider-sm"></div>

        <div class="stat-row">
          <span class="stat-label">Common Name</span>
          <span class="stat-value" id="commonName">—</span>
        </div>

        <div class="conf-bar-wrap">
          <div class="conf-bar-label">
            <span>Confidence</span>
            <span id="confPct">—</span>
          </div>
          <div class="conf-bar-track">
            <div class="conf-bar-fill" id="confBar"></div>
          </div>
        </div>
      </div>

      <div class="result-error" id="resultError"></div>
    </div>

  </div>
</div>

<script>
  const video      = document.getElementById('video');
  const scanLine   = document.getElementById('scanLine');
  const badge      = document.getElementById('statusBadge');
  const statusTxt  = document.getElementById('statusText');
  const captureBtn = document.getElementById('captureBtn');
  const noCam      = document.getElementById('noCam');

  /* ── CAMERA ── */
  navigator.mediaDevices.getUserMedia({ video: { facingMode:'environment' } })
    .then(stream => {
      video.srcObject = stream;
      badge.className = 'status-badge live';
      statusTxt.textContent = 'Live';
      scanLine.classList.add('active');
    })
    .catch(err => {
      noCam.style.display = 'flex';
      document.getElementById('noCamMsg').textContent = err.message || 'Camera unavailable';
      badge.className = 'status-badge ready';
      statusTxt.textContent = 'No Camera';
      captureBtn.disabled = true;
    });

  /* ── RIPPLE ── */
  captureBtn.addEventListener('click', function(e) {
    if (this.disabled) return;
    const r = document.createElement('div');
    r.className = 'btn-ripple';
    const rect = this.getBoundingClientRect();
    const sz = Math.max(rect.width,rect.height)*2;
    r.style.cssText=`width:${sz}px;height:${sz}px;left:${e.clientX-rect.left}px;top:${e.clientY-rect.top}px;`;
    this.appendChild(r);
    setTimeout(()=>r.remove(),700);
  });

  /* ── CAPTURE & IDENTIFY ── */
  function capture() {
    if (captureBtn.disabled) return;

    // loading state
    captureBtn.disabled = true;
    document.getElementById('btnText').style.display = 'none';
    document.getElementById('captureIcon').style.display = 'none';
    document.getElementById('btnSpinner').style.display = 'block';

    document.getElementById('placeholder').style.display = 'flex';
    document.getElementById('resultContent').className = 'result-content';
    document.getElementById('resultError').className   = 'result-error';

    const canvas = document.createElement('canvas');
    canvas.width = 300; canvas.height = 300;
    canvas.getContext('2d').drawImage(video, 0, 0, 300, 300);
    const imageData = canvas.toDataURL('image/jpeg');

    fetch('/predict', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ image: imageData })
    })
    .then(r => r.json())
    .then(data => {
      document.getElementById('placeholder').style.display = 'none';

      document.getElementById('plantName').textContent  = data.plant_name  || 'Unknown';
      document.getElementById('sciName').textContent    = data.scientific_name || '—';
      document.getElementById('commonName').textContent = data.plant_name  || '—';

      const conf = parseFloat(data.confidence) || 0;
      document.getElementById('confPct').textContent = conf.toFixed(1) + '%';
      setTimeout(()=>{ document.getElementById('confBar').style.width = conf + '%'; }, 80);

      document.getElementById('resultContent').className = 'result-content visible';
    })
    .catch(err => {
      document.getElementById('placeholder').style.display = 'none';
      const el = document.getElementById('resultError');
      el.textContent = 'Identification failed: ' + (err.message || 'Unknown error');
      el.className   = 'result-error visible';
    })
    .finally(() => {
      captureBtn.disabled = false;
      document.getElementById('btnText').style.display    = 'inline';
      document.getElementById('captureIcon').style.display = 'inline';
      document.getElementById('btnSpinner').style.display  = 'none';
    });
  }

  /* ── PARTICLES ── */
  function spawnParticle() {
    const p = document.createElement('div');
    p.className = 'particle';
    const s = Math.random()*3+1;
    p.style.cssText=`width:${s}px;height:${s}px;left:${Math.random()*100}vw;animation-duration:${Math.random()*12+8}s;animation-delay:${Math.random()*4}s;opacity:${Math.random()*0.4+0.15};`;
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),22000);
  }
  for(let i=0;i<12;i++) spawnParticle();
  setInterval(spawnParticle,900);
</script>
</body>
</html>
